name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install without Docling in CI (too heavy for CI runner)
          # Docling falls back gracefully to PyPDF in tests
          grep -v "^docling" requirements.txt | pip install -r /dev/stdin
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check src/ ingest_routee.py app.py

      - name: Format check with ruff
        run: ruff format --check src/ ingest_routee.py app.py

      - name: Type check with mypy
        run: mypy src/models.py src/rag_pipeline.py --ignore-missing-imports

      - name: Run unit tests
        # Tests are fully offline — no OpenAI key needed
        # Pydantic model tests + Silver layer chunking tests
        run: pytest tests/ -v --tb=short
